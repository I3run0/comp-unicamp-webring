# Define a zona de limitação de taxa (Máximo de 10 requisições por segundo por IP)
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name webring.comp-unicamp.br;

    # Caminho de validação do Let's Encrypt (mantenha aberto para renovações)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona todo o tráfego HTTP para HTTPS de forma segura
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name webring.comp-unicamp.br;

    # Caminho onde o seu index.html estará localizado
    root /var/www/webring.comp-unicamp.br/html;
    index index.html;

    # 1. SEGURANÇA DO SERVIDOR
    server_tokens off; # Esconde a versão do Nginx contra escaneamentos de vulnerabilidades

    # 2. CABEÇALHOS DE SEGURANÇA (HEADERS)
    add_header X-Frame-Options "SAMEORIGIN" always; # Bloqueia Clickjacking
    add_header X-Content-Type-Options "nosniff" always; # Bloqueia sniffing de MIME-type
    add_header X-XSS-Protection "1; mode=block" always; # Proteção legada contra XSS
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always; # Restringe execução de scripts maliciosos
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always; # Força HTTPS por 1 ano (HSTS)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always; # Protege a privacidade do usuário

    # 3. CAMINHOS DOS CERTIFICADOS SSL (Gerados pelo Certbot)
    ssl_certificate /etc/letsencrypt/live/webring.comp-unicamp.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webring.comp-unicamp.br/privkey.pem;

    # 4. CONFIGURAÇÕES SSL SEGURAS (Desativa TLS 1.0 e 1.1 obsoletos)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # Otimização de Performance do Cache SSL
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 5. ENTREGA DO CONTEÚDO ESTÁTICO COM LIMITAÇÃO DE TAXA
    location / {
        limit_req zone=mylimit burst=20 nodelay; # Protege contra DDoS mitigando acessos abusivos
        try_files $uri $uri/ =404;
    }

    # Bloqueia acesso a arquivos ocultos ou sensíveis (como .git ou .env)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

